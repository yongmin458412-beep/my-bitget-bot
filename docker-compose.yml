version: "3.9"

services:
  bot:
    build: .
    container_name: bitget-futures-bot
    command: python run_bot.py
    env_file:
      - .env
    volumes:
      - ./:/app
    restart: unless-stopped

  dashboard:
    build: .
    container_name: bitget-futures-dashboard
    command: python run_streamlit.py
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    restart: unless-stopped

